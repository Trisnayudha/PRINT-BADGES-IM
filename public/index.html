<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IM Scan Print Server</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
  header { background: #1B2E80; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 700; }
  header .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  header .status-dot.offline { background: #f87171; }
  .main { max-width: 860px; margin: 24px auto; padding: 0 16px; display: grid; gap: 16px; }
  .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .5px; color: #666; margin-bottom: 14px; }
  .stat-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 100px; background: #f8f8f8; border-radius: 8px; padding: 14px 16px; }
  .stat .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .4px; }
  .stat .value { font-size: 26px; font-weight: 700; color: #1B2E80; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #eee; }
  td { padding: 10px 10px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  .badge-status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .badge-status.done { background: #dcfce7; color: #166534; }
  .badge-status.failed { background: #fee2e2; color: #991b1b; }
  .badge-status.pending, .badge-status.printing { background: #fef9c3; color: #854d0e; }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-primary { background: #1B2E80; color: white; }
  .btn-primary:hover { background: #15236a; }
  .btn-danger { background: #fee2e2; color: #991b1b; }
  .btn-danger:hover { background: #fecaca; }
  .actions { display: flex; gap: 8px; align-items: center; }
  .printer-name { font-family: monospace; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  #testSection { display: grid; gap: 10px; }
  #testSection label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  #testSection input, #testSection select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  #testResult { margin-top: 10px; padding: 10px 14px; border-radius: 6px; font-size: 13px; display: none; }
  #testResult.ok { background: #dcfce7; color: #166534; }
  #testResult.err { background: #fee2e2; color: #991b1b; }
  .empty-state { text-align: center; color: #aaa; padding: 24px; font-size: 13px; }
  .test-layout { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start; }
  @media (max-width: 640px) { .test-layout { grid-template-columns: 1fr; } }
  .preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .preview-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .4px; }
  .preview-scale { width: 158px; height: 225px; overflow: hidden; position: relative; border: 1px solid #e0e0e0; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.1); flex-shrink: 0; }
  .preview-scale iframe { width: 396px; height: 566px; border: none; transform: scale(0.4); transform-origin: top left; pointer-events: none; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="statusDot"></div>
  <h1>IM Scan — Print Server</h1>
  <span id="statusText" style="font-size:13px;opacity:.8;margin-left:auto;"></span>
</header>

<div class="main">

  <div class="card">
    <h2>Status Server</h2>
    <div class="stat-row">
      <div class="stat">
        <div class="label">Koneksi</div>
        <div class="value" id="connStatus">–</div>
      </div>
      <div class="stat">
        <div class="label">Printer</div>
        <div class="value" id="printerName" style="font-size:14px;padding-top:8px;">–</div>
      </div>
      <div class="stat">
        <div class="label">Total Print</div>
        <div class="value" id="totalDone">–</div>
      </div>
      <div class="stat">
        <div class="label">Antrian Gagal</div>
        <div class="value" id="totalFailed" style="color:#ef4444;">–</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <h2 style="margin:0;">Antrian Print</h2>
      <div class="actions">
        <button class="btn btn-primary" onclick="retryAll()">Retry Semua</button>
        <button class="btn" onclick="loadQueue()" style="background:#f0f0f0;color:#333;">Refresh</button>
      </div>
    </div>
    <div id="queueTable">
      <div class="empty-state">Memuat antrian...</div>
    </div>
  </div>

  <div class="card">
    <h2>Test Print</h2>
    <div class="test-layout">
      <div id="testSection">
        <div>
          <label>Nama (display besar)</label>
          <input id="testDisplayName" value="Calliope" placeholder="Nama tampil besar">
        </div>
        <div>
          <label>Nama Lengkap</label>
          <input id="testName" value="Anastasia Nagisa" placeholder="Nama lengkap">
        </div>
        <div>
          <label>Perusahaan</label>
          <input id="testCompany" value="INDONESIAMINER BISNIS GLOBAL">
        </div>
        <div>
          <label>Departemen / Jabatan</label>
          <input id="testDepartment" value="Marketing &amp; Corporate">
        </div>
        <div>
          <label>Tipe Tiket</label>
          <select id="testTicket">
            <option value="DELEGATE">DELEGATE</option>
            <option value="EXHIBITOR">EXHIBITOR</option>
            <option value="SPEAKER">SPEAKER</option>
            <option value="PRESS">PRESS</option>
            <option value="VIP">VIP</option>
            <option value="ORGANIZER">ORGANIZER</option>
          </select>
        </div>
        <div>
          <label>QR Code Content</label>
          <input id="testQr" value="EVT2026-TEST-001">
        </div>
        <div>
          <button class="btn btn-primary" onclick="testPrint()" style="width:100%;padding:12px;">
            Cetak Test Badge
          </button>
        </div>
        <div id="testResult"></div>
      </div>

      <div class="preview-wrap">
        <div class="preview-label">Preview Badge</div>
        <div class="preview-scale">
          <iframe id="badgePreview"></iframe>
        </div>
        <button class="btn" onclick="refreshPreview()" style="background:#f0f0f0;color:#333;font-size:12px;padding:5px 12px;">
          Refresh Preview
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const BASE = '';

async function fetchHealth() {
  try {
    const r = await fetch(`${BASE}/health`);
    const d = await r.json();
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('connStatus').textContent = 'Online';
    document.getElementById('printerName').innerHTML = `<span class="printer-name">${d.printer}</span>`;
    document.getElementById('statusText').textContent = `Event: ${d.event}`;
  } catch {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('connStatus').textContent = 'Offline';
  }
}

async function loadQueue() {
  try {
    const r = await fetch(`${BASE}/api/queue`);
    const { jobs } = await r.json();

    const done = jobs.filter(j => j.status === 'done').length;
    const failed = jobs.filter(j => j.status === 'failed').length;
    document.getElementById('totalDone').textContent = done;
    document.getElementById('totalFailed').textContent = failed;

    if (jobs.length === 0) {
      document.getElementById('queueTable').innerHTML = '<div class="empty-state">Tidak ada antrian</div>';
      return;
    }

    const recent = [...jobs].reverse().slice(0, 50);
    document.getElementById('queueTable').innerHTML = `
      <table>
        <thead><tr>
          <th>Nama</th><th>Perusahaan</th><th>Tiket</th><th>Status</th><th>Waktu</th><th></th>
        </tr></thead>
        <tbody>
          ${recent.map(j => `
            <tr>
              <td>${j.data.display_name || j.data.name || '–'}</td>
              <td style="color:#666">${j.data.company || '–'}</td>
              <td>${j.data.ticket_type || '–'}</td>
              <td><span class="badge-status ${j.status}">${j.status}</span></td>
              <td style="color:#999;font-size:12px">${new Date(j.created_at).toLocaleTimeString('id-ID')}</td>
              <td>
                ${j.status === 'failed' ? `<button class="btn btn-danger" onclick="deleteJob('${j.id}')">Hapus</button>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    console.error(e);
  }
}

async function retryAll() {
  await fetch(`${BASE}/api/queue/retry`, { method: 'POST' });
  setTimeout(loadQueue, 2000);
}

async function deleteJob(id) {
  await fetch(`${BASE}/api/queue/${id}`, { method: 'DELETE' });
  loadQueue();
}

function getTestPayload() {
  return {
    display_name: document.getElementById('testDisplayName').value,
    name: document.getElementById('testName').value,
    company: document.getElementById('testCompany').value,
    department: document.getElementById('testDepartment').value,
    ticket_type: document.getElementById('testTicket').value,
    qr_code: document.getElementById('testQr').value,
    access: ['CONFERENCE', 'EXHIBITION', 'NETWORKING FUNCTIONS'],
  };
}

let previewDebounce = null;
async function refreshPreview() {
  try {
    const r = await fetch(`${BASE}/api/preview`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(getTestPayload()),
    });
    const html = await r.text();
    const iframe = document.getElementById('badgePreview');
    iframe.srcdoc = html;
  } catch (e) {
    console.error('Preview failed:', e);
  }
}

function schedulePreview() {
  clearTimeout(previewDebounce);
  previewDebounce = setTimeout(refreshPreview, 600);
}

async function testPrint() {
  const resultEl = document.getElementById('testResult');
  resultEl.style.display = 'none';
  try {
    const payload = getTestPayload();
    const r = await fetch(`${BASE}/print`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    resultEl.textContent = d.success ? `✓ Print dikirim! Job ID: ${d.job_id}` : `✗ Error: ${d.error}`;
    resultEl.className = d.success ? 'ok' : 'err';
    resultEl.style.display = 'block';
    setTimeout(loadQueue, 2000);
  } catch (e) {
    resultEl.textContent = `✗ Tidak bisa terhubung ke server: ${e.message}`;
    resultEl.className = 'err';
    resultEl.style.display = 'block';
  }
}

fetchHealth();
loadQueue();
refreshPreview();
setInterval(() => { fetchHealth(); loadQueue(); }, 5000);

['testDisplayName','testName','testCompany','testDepartment','testQr'].forEach(id => {
  document.getElementById(id).addEventListener('input', schedulePreview);
});
document.getElementById('testTicket').addEventListener('change', refreshPreview);
</script>
</body>
</html>
